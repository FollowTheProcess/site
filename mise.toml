[tools]
hugo-extended = "latest"
typos = "latest"

[tasks.chroma]
description = "Regenerate code-block highlight CSS from Chroma styles"
env.LIGHT_STYLE = "catppuccin-latte"
env.DARK_STYLE = "catppuccin-macchiato"
run = '''
mkdir -p assets/css
{
  printf '/* Generated by `mise run chroma` from %s (light) and %s (dark). Do not edit by hand. */\n\n' "$LIGHT_STYLE" "$DARK_STYLE"
  printf 'html:not(.dark) {\n'
  hugo gen chromastyles --style="$LIGHT_STYLE"
  printf '}\n\nhtml.dark {\n'
  hugo gen chromastyles --style="$DARK_STYLE"
  printf '}\n'
} > assets/css/custom.css
'''

[tasks.build]
description = "Build the site locally"
depends = ["chroma"]
run = "hugo build --buildDrafts --minify"

[tasks.serve]
description = "Build and serve locally"
depends = ["build"]
run = [
  'open "http://localhost:1313/"',
  "hugo server --buildDrafts",
]

[tasks.check]
description = "Check content for typos and validate the resume"
run = "typos --config .typos.toml"

[tasks.update]
description = "Update theme submodule"
run = [
  "git submodule update --remote --merge",
  "git submodule foreach git pull origin main",
]

[tasks.post]
description = "Create a new post"
usage = 'arg "<name>" help="Post name (used as directory under content/posts/)"'
run = 'hugo new --kind post "content/posts/$usage_name/index.md"'
